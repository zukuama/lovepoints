<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LovePoints | Pro</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@10.0.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            padding-bottom: 50px;
        }

        .main-card {
            border: none;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .btn-action {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 5px;
            border-radius: 15px;
            transition: all 0.2s ease;
            border: 2px solid #f1f1f1;
            background: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .btn-action:active {
            transform: scale(0.95);
            background-color: #fff0f7;
        }

        .btn-action span {
            font-size: 0.75rem;
            font-weight: 400;
            color: #6c757d;
        }

        .score-display {
            background: linear-gradient(135deg, #2c3e50, #000000);
            color: white;
            border-radius: 20px;
            padding: 20px;
        }

        .user-toggle {
            background: #e9ecef;
            border-radius: 50px;
            padding: 5px;
        }

        .user-toggle button {
            border-radius: 50px;
            font-weight: 600;
            padding: 10px 20px;
        }

        .history-item {
            border-left: 4px solid #ff4bb4;
            margin-bottom: 10px;
            background: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .custom-section {
            background: #fff5fa;
            border: 2px dashed #ff4bb4;
            border-radius: 20px;
        }

        .badge-points {
            background-color: #ff4bb4;
            color: white;
        }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            
            <!-- Header -->
            <div class="text-center mb-4">
                <h1 class="fw-bold text-primary">LovePoints <span style="color: #ff4bb4;">❤</span></h1>
                <p class="text-muted small">Registren sus acciones diarias y sumen puntos</p>
            </div>

            <!-- Selector de Usuario -->
            <div class="user-toggle d-flex mb-4">
                <button id="btn-u1" class="btn w-100 btn-dark shadow-none" onclick="setUser('Hombre')">👨 Él</button>
                <button id="btn-u2" class="btn w-100 btn-light shadow-none" onclick="setUser('Mujer')">👩 Ella</button>
            </div>

            <!-- Panel de Acciones -->
            <div class="main-card card p-3 mb-4">
                <h6 class="fw-bold mb-3">Acciones Rápidas</h6>
                <div class="row g-2">
                    <div class="col-6">
                        <button class="btn btn-action w-100" onclick="addPoint('Beso', 15)">💋 Beso <span>+15 pts</span></button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-action w-100" onclick="addPoint('Abrazo', 20)">🫂 Abrazo <span>+20 pts</span></button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-action w-100" onclick="addPoint('Cocinar', 50)">🍳 Cocinar <span>+50 pts</span></button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-action w-100" onclick="addPoint('Lavar platos', 30)">🍽️ Lavar Platos <span>+30 pts</span></button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-action w-100" onclick="addPoint('Masaje', 45)">💆 Masaje <span>+45 pts</span></button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-action w-100" onclick="addPoint('Limpieza', 60)">✨ Limpieza <span>+60 pts</span></button>
                    </div>
                </div>
            </div>

            <!-- Acción Personalizada -->
            <div class="custom-section p-3 mb-4">
                <label class="form-label small fw-bold">¿Hiciste algo especial?</label>
                <div class="input-group">
                    <input type="text" id="custom-name" class="form-control border-0" placeholder="Acción...">
                    <input type="number" id="custom-pts" class="form-control border-0 w-25" placeholder="Pts">
                    <button class="btn btn-primary" onclick="addCustom()">+</button>
                </div>
            </div>

            <!-- Scoreboard -->
            <div class="score-display text-center mb-4">
                <p class="small text-uppercase tracking-widest opacity-50 mb-2">Puntaje del Mes</p>
                <div class="d-flex justify-content-around align-items-center">
                    <div>
                        <div class="h6 mb-0">ÉL</div>
                        <div id="score-Hombre" class="h2 fw-bold mb-0">0</div>
                    </div>
                    <div class="vr mx-3"></div>
                    <div>
                        <div class="h6 mb-0">ELLA</div>
                        <div id="score-Mujer" class="h2 fw-bold mb-0">0</div>
                    </div>
                </div>
            </div>

            <!-- Historial -->
            <div class="history">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h6 class="fw-bold mb-0">Historial de <span id="current-user-name">Él</span></h6>
                </div>
                <div id="history-list">
                    <!-- Logs aquí -->
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let currentUser = 'Hombre';
    let logs = JSON.parse(localStorage.getItem('coupleLogs')) || [];

    function setUser(user) {
        currentUser = user;
        const btnU1 = document.getElementById('btn-u1');
        const btnU2 = document.getElementById('btn-u2');
        const nameDisplay = document.getElementById('current-user-name');

        if(user === 'Hombre') {
            btnU1.className = 'btn w-100 btn-dark shadow-none';
            btnU2.className = 'btn w-100 btn-light shadow-none';
            nameDisplay.innerText = 'Él';
        } else {
            btnU1.className = 'btn w-100 btn-light shadow-none';
            btnU2.className = 'btn w-100 btn-primary shadow-none';
            nameDisplay.innerText = 'Ella';
        }
        updateUI();
    }

    function addPoint(action, points) {
        const now = new Date();
        const entry = {
            user: currentUser,
            action: action,
            points: parseInt(points),
            dateStr: now.toLocaleDateString(),
            timeStr: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            month: now.getMonth(),
            year: now.getFullYear()
        };
        
        logs.push(entry);
        localStorage.setItem('coupleLogs', JSON.stringify(logs));
        
        // Efecto visual rápido
        updateUI();
    }

    function addCustom() {
        const nameInput = document.getElementById('custom-name');
        const ptsInput = document.getElementById('custom-pts');
        if (nameInput.value && ptsInput.value) {
            addPoint(nameInput.value, ptsInput.value);
            nameInput.value = '';
            ptsInput.value = '';
        }
    }

    function updateUI() {
        const currentMonth = new Date().getMonth();
        const currentYear = new Date().getFullYear();

        const totals = logs.reduce((acc, log) => {
            if(log.month === currentMonth && log.year === currentYear) {
                acc[log.user] = (acc[log.user] || 0) + log.points;
            }
            return acc;
        }, { Hombre: 0, Mujer: 0 });

        document.getElementById('score-Hombre').innerText = totals.Hombre;
        document.getElementById('score-Mujer').innerText = totals.Mujer;

        const historyList = document.getElementById('history-list');
        historyList.innerHTML = '';
        
        const userLogs = logs.filter(l => l.user === currentUser).reverse().slice(0, 5);
        
        userLogs.forEach(l => {
            const div = document.createElement('div');
            div.className = 'history-item d-flex justify-content-between align-items-center shadow-sm';
            div.innerHTML = `
                <div>
                    <strong>${l.action}</strong><br>
                    <small class="text-muted">${l.dateStr} a las ${l.timeStr}</small>
                </div>
                <span class="badge rounded-pill badge-points">+${l.points}</span>
            `;
            historyList.appendChild(div);
        });
    }

    updateUI();
</script>

</body>
</html>
