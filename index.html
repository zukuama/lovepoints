<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>LovePoints</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet"
/>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
rel="stylesheet"
/>

<style>

body{

  background:#f5f7fb;

  font-family:'Poppins',sans-serif;

  color:#222;

}

.main-card{

  border:none;

  border-radius:24px;

  background:white;

  box-shadow:
  0 10px 30px rgba(0,0,0,.06);

}

.btn-action{

  border-radius:18px;

  padding:18px;

  border:1px solid #eee;

  background:white;

  transition:.2s;

  font-weight:600;

}

.btn-action:hover{

  transform:translateY(-2px);

}

.score{

  background:
  linear-gradient(
    135deg,
    #ff4bb4,
    #ff6bc8
  );

  color:white;

  border-radius:25px;

  padding:25px;

}

.history-item{

  background:white;

  padding:14px;

  border-left:
  5px solid #ff4bb4;

  margin-bottom:10px;

  border-radius:14px;

  box-shadow:
  0 5px 15px rgba(0,0,0,.03);

}

.profile{

  display:flex;

  align-items:center;

  gap:12px;

}

.profile img{

  width:50px;

  height:50px;

  border-radius:50%;

  object-fit:cover;

}

.connected-box{

  background:#fff0f8;

  border:2px dashed #ff4bb4;

  border-radius:20px;

  padding:15px;

  text-align:center;

}

</style>

</head>

<body>

<div class="container py-4">

<div class="row justify-content-center">

<div class="col-12 col-md-6">

<h1 class="text-center fw-bold mb-4">
❤️ LovePoints
</h1>


<!-- PERFIL -->
<div class="main-card p-3 mb-3">

<div
class="d-flex justify-content-between align-items-center"
>

<button
id="login-btn"
class="btn btn-dark"
onclick="login()"
>
🔐 Iniciar sesión
</button>

<div
id="profile-box"
class="profile"
style="display:none;"
>

<img
id="profile-img"
src=""
/>

<div>

<div
id="profile-name"
class="fw-bold"
>
Usuario
</div>

<small class="text-muted">
Conectado
</small>

</div>

</div>

<button
id="logout-btn"
class="btn btn-danger"
onclick="logout()"
style="display:none;"
>
Salir
</button>

</div>

</div>


<!-- PAREJA -->
<div
id="couple-section"
class="main-card p-3 mb-3"
>

<h5 class="fw-bold mb-3">
❤️ Pareja
</h5>

<button
class="btn btn-primary mb-3"
onclick="createMyCouple()"
>
Crear pareja
</button>

<p>
Código:
<strong id="couple-code">
---
</strong>
</p>

<hr>

<input
id="join-code"
class="form-control mb-2"
placeholder="Ingresar código"
/>

<button
class="btn btn-dark w-100"
onclick="joinMyCouple()"
>
Unirse
</button>

</div>


<!-- CONECTADOS -->
<div
id="connected-box"
class="connected-box mb-3"
style="display:none;"
>

<div class="fw-bold mb-1">
❤️ Pareja conectada
</div>

<div>
Código:
<strong id="connected-code">
---
</strong>
</div>

</div>


<!-- ACCIONES -->
<div class="main-card p-3 mb-3">

<h5 class="fw-bold mb-3">
Acciones
</h5>

<div class="row g-2">

<div class="col-6">
<button
class="btn btn-action w-100"
onclick="addPoint('Beso',15)"
>
💋 Beso +15
</button>
</div>

<div class="col-6">
<button
class="btn btn-action w-100"
onclick="addPoint('Abrazo',20)"
>
🫂 Abrazo +20
</button>
</div>

<div class="col-6">
<button
class="btn btn-action w-100"
onclick="addPoint('Masaje',45)"
>
💆 Masaje +45
</button>
</div>

<div class="col-6">
<button
class="btn btn-action w-100"
onclick="addPoint('Cocinar',50)"
>
🍳 Cocinar +50
</button>
</div>

</div>

</div>


<!-- SCORE -->
<div class="score text-center mb-3">

<h4 class="fw-bold mb-4">
🏆 Puntaje
</h4>

<div class="row">

<div class="col">

<h5 id="name-hombre">
Él
</h5>

<div
id="score-Hombre"
class="fs-2 fw-bold"
>
0
</div>

</div>

<div class="col">

<h5 id="name-mujer">
Ella
</h5>

<div
id="score-Mujer"
class="fs-2 fw-bold"
>
0
</div>

</div>

</div>

</div>


<!-- HISTORIAL -->
<div id="history-list"></div>

</div>

</div>

</div>

<script
type="module"
src="js/app.js"
></script>

</body>
</html>
