<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LovePoints</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet"
/>

<style>

body{
  background:#f8f9fa;
  font-family:sans-serif;
}

.main-card{
  border:none;
  border-radius:20px;
  background:white;
  box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.btn-action{
  border-radius:15px;
  padding:15px;
  border:1px solid #eee;
  background:white;
  transition:.2s;
}

.btn-action:hover{
  transform:scale(1.02);
}

.score{
  background:#ff4bb4;
  color:white;
  border-radius:20px;
  padding:20px;
}

.history-item{
  background:white;
  padding:10px;
  border-left:4px solid #ff4bb4;
  margin-bottom:10px;
  border-radius:8px;
}

</style>
</head>

<body>

<div class="container py-4">

<div class="row justify-content-center">

<div class="col-12 col-md-6">

<h1 class="text-center mb-4">
❤️ LovePoints
</h1>

<!-- LOGIN -->
<div class="main-card p-3 mb-3 text-center">

<button
class="btn btn-dark"
onclick="login()"
>
🔐 Iniciar con Google
</button>

<p class="mt-2 mb-0">
Usuario:
<strong id="user-name">
No logueado
</strong>
</p>

</div>

<button
class="btn btn-danger mt-2"
onclick="logout()"
>
Cerrar sesión
</button>

<!-- PAREJA -->
<div class="main-card p-3 mb-3">

<h5>❤️ Pareja</h5>

<button
class="btn btn-primary mb-2"
onclick="createMyCouple()"
>
Crear pareja
</button>

<p>
Código:
<strong id="couple-code">
---
</strong>
</p>

<hr>

<input
id="join-code"
class="form-control mb-2"
placeholder="Ingresar código"
/>

<button
class="btn btn-dark w-100"
onclick="joinMyCouple()"
>
Unirse
</button>

</div>

<!-- ACCIONES -->
<div class="main-card p-3 mb-3">

<h5 class="mb-3">
Acciones
</h5>

<div class="row g-2">

<div class="col-6">
<button
class="btn btn-action w-100"
onclick="addPoint('Beso',15)"
>
💋 Beso +15
</button>
</div>

<div class="col-6">
<button
class="btn btn-action w-100"
onclick="addPoint('Abrazo',20)"
>
🫂 Abrazo +20
</button>
</div>

<div class="col-6">
<button
class="btn btn-action w-100"
onclick="addPoint('Masaje',45)"
>
💆 Masaje +45
</button>
</div>

<div class="col-6">
<button
class="btn btn-action w-100"
onclick="addPoint('Cocinar',50)"
>
🍳 Cocinar +50
</button>
</div>

</div>

</div>

<!-- SCORE -->
<div class="score text-center mb-3">

<h4>Puntaje</h4>

<div class="row">

<div class="col">
<h5>Él</h5>
<div id="score-Hombre">0</div>
</div>

<div class="col">
<h5>Ella</h5>
<div id="score-Mujer">0</div>
</div>

</div>

</div>

<!-- HISTORIAL -->
<div id="history-list"></div>

</div>
</div>
</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
