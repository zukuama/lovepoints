<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LovePoints</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #f8f9fa;
  font-family: sans-serif;
}

.btn-action {
  border-radius: 15px;
  padding: 15px;
  background: white;
  border: 1px solid #eee;
}

.score {
  background: #ff4bb4;
  color: white;
  padding: 20px;
  border-radius: 20px;
}

.history-item {
  background: white;
  margin-bottom: 10px;
  padding: 10px;
  border-left: 4px solid #ff4bb4;
}
</style>
</head>

<body>

<div class="container py-4">

<h2 class="text-center">❤️ LovePoints</h2>

<!-- 🔐 LOGIN -->
<div class="text-center mb-3">
  <button class="btn btn-dark" onclick="login()">🔐 Iniciar con Google</button>
  <p class="small mt-2">
    Usuario: <strong id="user-name">No logueado</strong>
  </p>
</div>

<!-- selector -->
<div class="d-flex mb-3">
<button class="btn btn-dark w-50" onclick="setUser('Hombre')">Él</button>
<button class="btn btn-light w-50" onclick="setUser('Mujer')">Ella</button>
</div>

<!-- acciones -->
<div class="row g-2 mb-3">
<div class="col-6">
<button class="btn btn-action w-100" onclick="addPoint('Beso',15)">💋 Beso +15</button>
</div>
<div class="col-6">
<button class="btn btn-action w-100" onclick="addPoint('Abrazo',20)">🫂 Abrazo +20</button>
</div>
</div>

<!-- marcador -->
<div class="score text-center mb-3">
<div>Él: <span id="score-Hombre">0</span></div>
<div>Ella: <span id="score-Mujer">0</span></div>
</div>

<!-- historial -->
<div id="history-list"></div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
